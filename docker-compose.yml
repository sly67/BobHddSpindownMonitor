services:
  hdd-monitor:
    build: .
    container_name: hdd-monitor
    privileged: true
    ports:
      - "48070:48070"
    volumes:
      - hdd-monitor-data:/data
      - /dev/kmsg:/dev/kmsg
      - /dev:/dev
      - ./config.json:/app/config.json
    restart: unless-stopped

volumes:
  hdd-monitor-data:
